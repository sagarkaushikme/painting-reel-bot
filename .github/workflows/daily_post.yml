name: Daily Multi-Page Posting

on:
  schedule:
    # 13:30 UTC = 7:00 PM IST (Roz Shaam Ko)
    - cron: '30 13 * * *'
  workflow_dispatch:

# ============================================================
# HOW TO ADD A NEW PAGE:
# 1. Create pages/<page_id>/ folder with config.yaml, prompts.py, content_source.py
# 2. Add secrets for that page in GitHub repo settings
# 3. Add the page to config/pages_registry.yaml with active: true
# That's it — this workflow auto-discovers active pages!
# ============================================================

jobs:
  # ---- Job 1: Read active pages from registry ----
  load-pages:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.get-pages.outputs.pages }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse active pages from registry
        id: get-pages
        run: |
          # Read pages_registry.yaml and extract active page IDs as JSON array
          PAGES=$(python3 -c "
          import yaml, json
          with open('config/pages_registry.yaml') as f:
              registry = yaml.safe_load(f)
          active = [p['id'] for p in registry.get('pages', []) if p.get('active', False)]
          print(json.dumps(active))
          ")
          echo "Active pages: $PAGES"
          echo "pages=$PAGES" >> $GITHUB_OUTPUT

  # ---- Job 2: Run pipeline for each active page (dynamic matrix) ----
  post-page:
    needs: load-pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    strategy:
      matrix:
        page: ${{ fromJson(needs.load-pages.outputs.pages) }}
      fail-fast: false   # one page failing doesn't block others
      max-parallel: 3    # run up to 3 pages simultaneously

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg + Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto fonts-noto-color-emoji

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline for ${{ matrix.page }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # All page secrets available — each page's content_source.py
          # reads only the env vars it needs via config.yaml
          PAINTING_IG_TOKEN: ${{ secrets.PAINTING_IG_TOKEN }}
          PAINTING_IG_USER_ID: ${{ secrets.PAINTING_IG_USER_ID }}
          PAISA_IG_TOKEN: ${{ secrets.PAISA_IG_TOKEN }}
          PAISA_IG_USER_ID: ${{ secrets.PAISA_IG_USER_ID }}
          # Add new page secrets here as needed:
          # NEWPAGE_IG_TOKEN: ${{ secrets.NEWPAGE_IG_TOKEN }}
          # NEWPAGE_IG_USER_ID: ${{ secrets.NEWPAGE_IG_USER_ID }}
        run: python main.py ${{ matrix.page }}

      - name: Commit blacklist updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/blacklists/
          git diff --staged --quiet || git commit -m "Posted via ${{ matrix.page }}: $(date '+%Y-%m-%d')"
          git push
